<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>本地人脸识别控制台</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<main class="shell">
  <header class="topbar">
    <div>
      <div class="eyebrow"><span class="dot"></span><span>InsightFace Local Console</span></div>
      <h1>本地人脸识别控制台</h1>
      <p class="subtitle">管理本地人脸库、查看识别记录，并把摄像头识别结果沉淀到本机 SQLite 数据库。</p>
    </div>
    <div class="status-pill"><span class="dot"></span><span id="serverStatus">等待后端响应</span></div>
  </header>

  <nav class="tabs" aria-label="控制台导航">
    <button class="active" data-tab="records">识别记录</button>
    <button data-tab="facedb">人脸库</button>
  </nav>

  <section class="tab-content active" id="tab-records">
    <div class="stats" id="stats"></div>
    <div class="latest-card" id="latest"></div>
    <section class="table-wrap">
      <div class="table-header">
        <h2>识别流水</h2>
        <div class="refresh"><span id="countLabel">0 条记录</span><span>实时刷新</span></div>
      </div>
      <div class="filters">
        <input type="text" id="searchName" placeholder="搜索姓名" oninput="applyFilters()">
        <select id="filterStatus" onchange="applyFilters()">
          <option value="">全部状态</option>
          <option value="recognized">已识别</option>
          <option value="unknown">未识别</option>
        </select>
        <select id="filterCamera" onchange="applyFilters()">
          <option value="">全部摄像头</option>
        </select>
      </div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>姓名</th>
              <th>置信度</th>
              <th>状态</th>
              <th>摄像头</th>
              <th>时间</th>
            </tr>
          </thead>
          <tbody id="records"></tbody>
        </table>
      </div>
      <div class="empty" id="empty"><strong>暂无识别记录</strong><span>启动摄像头识别并连接后端后，这里会自动更新。</span></div>
      <div class="connecting" id="connecting"><strong>正在连接后端</strong><span>请确认 run_backend.bat 已启动。</span></div>
    </section>
  </section>

  <section class="tab-content" id="tab-facedb">
    <div class="facedb-header">
      <h2 class="section-title" id="facedb-title">所有人员</h2>
      <div class="header-actions">
        <button class="btn btn-outline btn-sm" onclick="refreshFaces()">刷新</button>
        <button class="btn btn-primary btn-sm" onclick="showNewPersonModal()">新增人员</button>
        <button class="btn btn-success btn-sm" id="rebuildBtn" onclick="rebuildDB()">重新注册</button>
      </div>
    </div>
    <div id="facedb-list"></div>
    <div id="facedb-detail" class="hidden"></div>
  </section>
</main>

<div id="newPersonModal" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>新增人员</h3>
    <label for="newPersonName">姓名</label>
    <input type="text" id="newPersonName" placeholder="输入姓名" maxlength="50">
    <label>拍照采集</label>
    <div class="webcam-box">
      <video id="newPersonVideo" autoplay playsinline></video>
      <canvas id="newPersonCanvas"></canvas>
    </div>
    <div class="webcam-actions">
      <button class="btn btn-outline btn-sm" onclick="startCapture('newPerson')">打开摄像头</button>
      <button class="btn btn-primary btn-sm" onclick="capturePhoto('newPerson')">拍照</button>
    </div>
    <div class="captured-preview" id="newPersonPreview"></div>
    <label for="newPersonFiles">上传照片</label>
    <input type="file" id="newPersonFiles" accept="image/*" multiple>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="savePersonBtn" onclick="saveNewPerson()">保存</button>
    </div>
  </div>
</div>

<div id="addImagesModal" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 id="addImagesTitle">添加照片</h3>
    <label>拍照采集</label>
    <div class="webcam-box">
      <video id="addImagesVideo" autoplay playsinline></video>
      <canvas id="addImagesCanvas"></canvas>
    </div>
    <div class="webcam-actions">
      <button class="btn btn-outline btn-sm" onclick="startCapture('addImages')">打开摄像头</button>
      <button class="btn btn-primary btn-sm" onclick="capturePhoto('addImages')">拍照</button>
    </div>
    <div class="captured-preview" id="addImagesPreview"></div>
    <label for="addImagesFiles">上传照片</label>
    <input type="file" id="addImagesFiles" accept="image/*" multiple>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="saveImagesBtn" onclick="saveImages()">保存</button>
    </div>
  </div>
</div>

<script src="/static/app.js" defer></script>
</body>
</html>
